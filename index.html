<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/javascript.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fitness Tracker</title>
    <link rel="stylesheet" href="/src/css/style.css" />

  </head>
  <body>
    <header>
      <img src="/images/dumbbell.jpg" alt="Dumbbell" />
      <h1>Fitness Tracker</h1>
    </header>
    <nav>
      <ul>
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="workouts.html">Workouts</a></li>
        <li><a href="meals.html">Meals</a></li>
        <li><a href="bmi.html">BMI</a></li>
        <li><a href="game.html">Game</a></li>
      </ul>
    </nav>
    <main>
      <div id="calorie-tracker-container">
        <div id="calorie-progress-container-dashboard">
          <h2>Today's Calorie Intake</h2>
          <p><span id="current-calories-dashboard">0</span> / <span id="calorie-goal-dashboard">2000</span> kcal</p>
          <p>Remaining: <span id="remaining-calories-dashboard">0</span> kcal</p>
          <div id="calorie-progress-bar-container-dashboard">
            <div id="calorie-progress-bar-dashboard"></div>
          </div>
        </div>
        <div id="set-goal-container">
          <label for="calorie-goal-input">Set New Goal:</label>
          <input type="number" id="calorie-goal-input" placeholder="Enter new goal..." />
          <button id="set-goal-btn">Set Goal</button>
        </div>
      </div>
      <div id="water-tracker-container">
        <h2>Water Intake</h2>
        <div class="water-controls">
          <button id="remove-water-btn">-</button>
          <span id="water-count">0</span> / <span id="water-goal">8</span> glasses
          <button id="add-water-btn">+</button>
        </div>
        <button id="reset-water-btn" style="margin-bottom: 1rem; background-color: #e74c3c; color: white; border: none; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer;">Reset Water</button>
        <div id="set-water-goal-container" style="display: flex; flex-direction: column; justify-content: center; gap: 0.5rem; margin-bottom: 1rem;">
          <label for="water-goal-input">Set New Goal:</label>
          <div style="display: flex; gap: 0.5rem; justify-content: center;">
            <input type="number" id="water-goal-input" placeholder="Enter new goal..." style="width: 100px; padding: 0.5rem; border-radius: 8px; border: 1px solid #2c5364; background-color: rgba(255, 255, 255, 0.1); color: #f1f1f1;" />
            <button id="set-water-goal-btn" style="background-color: #4a90e2; color: white; border: none; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-weight: bold;">Set Goal</button>
          </div>
        </div>
        <div id="water-progress-bar-container">
          <div id="water-progress-bar"></div>
        </div>
        <p>Stay hydrated!</p>
      </div>
      <div id="sleep-tracker-container">
        <h2>Sleep Tracker</h2>
        <div class="sleep-input-group" style="display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 1rem;">
          <input type="number" id="sleep-input" step="0.5" placeholder="Hours slept" style="width: 120px; padding: 0.5rem; border-radius: 8px; border: 1px solid #2c5364; background-color: rgba(255, 255, 255, 0.1); color: #f1f1f1;" />
          <button id="add-sleep-btn" style="background-color: #4a90e2; color: white; border: none; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-weight: bold;">Log Sleep</button>
        </div>
        <div id="sleep-progress-container" style="margin-top: 1rem;">
          <p><span id="current-sleep">0</span> / <span id="sleep-goal">8</span> hours</p>
          <div id="sleep-progress-bar-container" style="width: 100%; background-color: rgba(255, 255, 255, 0.1); border-radius: 10px; height: 20px; overflow: hidden;">
            <div id="sleep-progress-bar" style="height: 100%; width: 0%; background-color: #9b59b6; border-radius: 10px; transition: width 0.5s ease-in-out;"></div>
          </div>
        </div>
      </div>
      <div id="weight-tracker-container"></div>
      <div id="charts"></div>
    </main>
    <footer>
      <p>&copy; 2025 Fitness Tracker</p>
    </footer>
    <script type="module" src="/src/js/dashboard.js"></script>
  </body>
</html>
